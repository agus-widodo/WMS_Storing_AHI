<script>
  /* 3.1.1 - UI Config */
  const UI_BRAND = { name: "WMS PRO", node: "AHI-NODE-01" };

  /* 3.1.2 - Local Login Logic */
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    btn.disabled = true;
    btn.innerHTML = `<span class="animate-spin mr-2 inline-block">◌</span> VERIFYING...`;

    try {
      // Memanggil fungsi global dari script.js (Modul 2)
      const res = await window.smartFetch({
        action: "checkLogin",
        username: data.username,
        password: data.password
      });

      if (res.status === "success") {
        localStorage.setItem("activeUser", res.username);
        window.userData = res; // Simpan data user ke global state
        
        // Animasi Transisi Keluar
        document.getElementById('login-container').classList.add('opacity-0', 'scale-95');
        setTimeout(() => window.navigateTo('Dashboard_Layout'), 300);
      } else {
        throw new Error(res.message);
      }
    } catch (err) {
      Swal.fire({ icon: 'error', title: 'AUTH_ERROR', text: err.message || "Koneksi Gagal" });
      btn.disabled = false;
      btn.innerHTML = `AUTHORIZE ACCESS →`;
    }
  }
</script>

<div id="login-container" class="min-h-screen flex items-center justify-center p-6 bg-[#fafafa] transition-all duration-500">
  <div class="w-full max-w-[400px]">
    
    <!-- BRANDING -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-zinc-950 rounded-[22px] shadow-2xl mb-6 ring-8 ring-zinc-950/5">
        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>
        </svg>
      </div>
      <h1 class="text-3xl font-black tracking-tighter text-zinc-900 italic">WMS<span class="text-amber-500">PRO</span></h1>
      <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.4em] mt-1">Industrial Intelligence</p>
    </div>

    <!-- FORM CARD -->
    <div class="bg-white border border-zinc-200 rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-10 backdrop-blur-sm">
      <form onsubmit="handleLogin(event)" class="space-y-6">
        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-1">Terminal ID</label>
          <input type="text" name="username" required class="w-full h-14 px-5 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 transition-all outline-none font-mono text-sm" placeholder="ID / NIK">
        </div>
        
        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-1">Access Key</label>
          <input type="password" name="password" required class="w-full h-14 px-5 bg-zinc-50 border border-zinc-200 rounded-2xl focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 transition-all outline-none text-sm" placeholder="••••••••">
        </div>

        <button type="submit" id="login-btn" class="w-full h-14 bg-zinc-950 hover:bg-zinc-900 text-white font-bold text-[11px] uppercase tracking-[0.2em] rounded-2xl shadow-xl shadow-zinc-950/20 transition-all active:scale-95">
          AUTHORIZE ACCESS →
        </button>
      </form>
    </div>

    <!-- FOOTER -->
    <div class="mt-10 flex items-center justify-between px-4 text-zinc-400">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
        <span class="text-[9px] font-mono uppercase tracking-tighter">System Live</span>
      </div>
      <span class="text-[9px] font-mono uppercase">Node: AHI-SYS-V3</span>
    </div>

  </div>
</div>
