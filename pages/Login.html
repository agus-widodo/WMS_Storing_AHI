<script>

  /* 3.2.1 - UI Branding & Sharp System */
const UI_THEME = {
  cornerRadius: "rounded-none", // Sharp Executive Style
  borderColor: "border-zinc-200",
  focusRing: "focus:ring-0 focus:border-zinc-950",
  buttonStyle: "bg-zinc-950 hover:bg-zinc-800 text-white"
};

  
/* 2.4.2 - Security-Aware Login Handler */
window.handleLogin = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const formData = new FormData(e.target);
  const { username, password } = Object.fromEntries(formData.entries());

  btn.disabled = true;
  btn.innerHTML = `<span class="animate-pulse italic">SECURE_CONNECTING...</span>`;

  try {
    const res = await window.smartFetch({
      action: "checkLogin",
      username: username,
      password: password
    });

    if (res.status === "success") {
      // Simpan Token Sesi untuk Validasi Anti-Multi Device
      localStorage.setItem("activeUser", res.username);
      localStorage.setItem("sessionID", res.sessionID);
      window.userData = res;
      
      window.navigateTo('Dashboard_Layout');
    } else {
      throw new Error(res.message);
    }
  } catch (err) {
    Swal.fire({ 
      icon: 'error', 
      title: 'SECURITY_ALERT', 
      text: err.message,
      confirmButtonColor: '#000',
      customClass: { popup: 'rounded-none' }
    });
    btn.disabled = false;
    btn.innerHTML = `AUTHORIZE ACCESS →`;
  }
};
  
</script>

<!-- 3.2.3 - UI Component: Sharp Executive SaaS -->
<div class="min-h-screen flex items-center justify-center p-0 bg-white selection:bg-zinc-950 selection:text-white">
  
  <div id="login-panel" class="w-full max-w-[440px] p-12 transition-all duration-500 ease-in-out border border-zinc-100 shadow-2xl shadow-zinc-100">
    
    <!-- BRANDING: MINIMALIST INDUSTRIAL -->
    <div class="mb-12">
      <div class="inline-block px-3 py-1 bg-zinc-950 text-white text-[10px] font-bold tracking-[0.4em] mb-6 uppercase">
        System Node 01
      </div>
      <h1 class="text-4xl font-black tracking-tighter text-zinc-900 uppercase">
        WMS<span class="text-zinc-400 font-light">PRO</span>
      </h1>
      <div class="w-12 h-1 bg-zinc-950 mt-2"></div>
    </div>

    <!-- FORM: SHARP SaaS STYLE -->
    <form onsubmit="handleLogin(event)" class="space-y-8">
      <div class="group">
        <label class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em] mb-2 block group-focus-within:text-zinc-950 transition-colors">
          Terminal Identifier
        </label>
        <input type="text" name="username" required 
          class="w-full h-12 bg-transparent border-b border-zinc-200 focus:border-zinc-950 transition-all outline-none font-mono text-sm placeholder:text-zinc-200"
          placeholder="ID.NIK.USER">
      </div>
      
      <div class="group">
        <label class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em] mb-2 block group-focus-within:text-zinc-950 transition-colors">
          Security Access Key
        </label>
        <input type="password" name="password" required 
          class="w-full h-12 bg-transparent border-b border-zinc-200 focus:border-zinc-950 transition-all outline-none text-sm placeholder:text-zinc-200"
          placeholder="PASSWORD_REQUIRED">
      </div>

      <div class="pt-4">
        <button type="submit" id="login-btn" 
          class="w-full h-14 bg-zinc-950 text-white font-bold text-[11px] uppercase tracking-[0.3em] rounded-none hover:bg-zinc-800 transition-all flex items-center justify-center group">
          AUTHORIZE ACCESS 
          <span class="ml-4 group-hover:translate-x-2 transition-transform font-light italic">→</span>
        </button>
      </div>
    </form>

    <!-- FOOTER: SYSTEM DIAGNOSTIC -->
    <div class="mt-16 pt-8 border-t border-zinc-50 flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span class="text-[9px] font-mono text-zinc-300 uppercase tracking-widest italic">Encrypted Session</span>
        <div class="flex items-center gap-2">
          <div class="w-1.5 h-1.5 bg-emerald-500"></div>
          <span class="text-[9px] font-black text-zinc-900 uppercase">Live.Stable</span>
        </div>
      </div>
      <div class="text-right">
        <span class="text-[9px] font-mono text-zinc-300 uppercase">Ahi-V3 // 2024</span>
      </div>
    </div>

  </div>
</div>
