<script>

/* 4.1.1 - Dashboard State & Security Timer */
window.dashboardConfig = {
  checkInterval: 30000, // Cek validitas sesi tiap 30 detik
  sidebarWidth: "w-72"
};
  
/* 4.1.2 - Dashboard Controller & RBAC Renderer */
window.initializeDashboard = function() {
  const user = window.userData;
  if (!user || !user.sessionID) return window.navigateTo('Login');

  // Inject Profile
  document.getElementById('exec-name').innerText = user.nama;
  document.getElementById('exec-role').innerText = user.role;

  // Render Role-Based Menu
  const menuContainer = document.getElementById('exec-sidebar-nav');
  menuContainer.innerHTML = user.menus.map(m => `
    <button onclick="navigateTo('${m.pageId}')" 
      class="w-full flex items-center gap-4 px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] border-b border-zinc-900 hover:bg-zinc-900 hover:text-white transition-all group">
      <span class="text-zinc-600 group-hover:text-amber-500">${m.icon || '■'}</span>
      <span>${m.name}</span>
    </button>
  `).join('');

  // Start Session Guardian (Anti-Multi Device)
  startSessionGuardian();
};

async function startSessionGuardian() {
  setInterval(async () => {
    const isValid = await window.smartFetch({
      action: "validateSession",
      username: window.userData.username,
      sessionID: window.userData.sessionID
    });
    
    if (!isValid) {
      Swal.fire({
        title: 'SESSION_EXPIRED',
        text: 'Akun login di perangkat lain atau sesi berakhir.',
        icon: 'warning',
        confirmButtonColor: '#000',
        customClass: { popup: 'rounded-none' }
      }).then(() => handleLogout());
    }
  }, window.dashboardConfig.checkInterval);
}
</script>

<!-- 4.1.3 - UI Component: Sharp Executive Dashboard -->
<div class="flex h-screen overflow-hidden bg-white text-zinc-950 font-sans">
  
  <!-- SIDEBAR: SHARP INDUSTRIAL DARK -->
  <aside class="w-72 bg-zinc-950 text-zinc-400 flex flex-col border-r border-zinc-200">
    <div class="p-8 border-b border-zinc-900">
      <p class="text-[9px] font-mono text-zinc-600 uppercase tracking-[0.4em] mb-2">Executive Access</p>
      <h2 class="text-2xl font-black tracking-tighter text-white uppercase italic">
        WMS<span class="text-zinc-500 font-light">PRO</span>
      </h2>
    </div>

    <nav id="exec-sidebar-nav" class="flex-1 overflow-y-auto">
      <!-- Menus Injected by RBAC Logic -->
    </nav>

    <div class="p-8 border-t border-zinc-900 bg-black">
      <div class="flex items-center justify-between">
        <div class="flex flex-col">
          <span id="exec-name" class="text-[11px] font-black text-white uppercase tracking-wider">---</span>
          <span id="exec-role" class="text-[9px] font-bold text-zinc-600 uppercase tracking-tighter">---</span>
        </div>
        <button onclick="handleLogout()" class="p-2 text-zinc-600 hover:text-white transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="flex-1 flex flex-col">
    <header class="h-20 bg-white border-b border-zinc-100 flex items-center justify-between px-10">
      <div class="flex items-center gap-6">
        <div class="h-8 w-[2px] bg-zinc-950"></div>
        <h3 id="current-page-title" class="text-[10px] font-black uppercase tracking-[0.5em] text-zinc-400">System Monitoring</h3>
      </div>
      <div class="flex items-center gap-4 font-mono text-[10px] text-zinc-300">
        <span>V.3.2.0-STABLE</span>
      </div>
    </header>

    <div id="content-area" class="flex-1 overflow-y-auto p-12 bg-[#fcfcfc]">
      <!-- Sub-pages render here -->
    </div>
  </main>
</div>
